# SearXNG settings for Picobot (schema-safe minimal)
general:
  instance_name: "picobot-searxng"
  debug: false

server:
  bind_address: "0.0.0.0"
  port: 8080
  secret_key: "change-me"
  base_url: "http://localhost:8080/"

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "all"
  formats:
    - html
    - json

ui:
  static_use_hash: true
  query_in_title: true
